*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',Arial,sans-serif;
  color:#f5f5f5;
  background:#000;
  overflow-x:hidden;
  scroll-behavior:smooth;
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(1.02);}
  to{opacity:1;transform:scale(1);}
}

/* background */
.parallax-bg{
  position:fixed;
  inset:0;
  z-index:-2;
  overflow:hidden;
  opacity:0;
  animation:fadeIn 7s ease-out forwards;
}

.parallax-bg video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transform:translateZ(0);
  will-change:transform;
}

.parallax-bg,
.parallax-bg video{
  pointer-events:none;
}

.parallax-bg video::-webkit-media-controls{
  display:none!important;
}

.parallax-bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:url('images/background.png') no-repeat center center;
  background-size:cover;
  opacity:.35;
  z-index:-1;
}

/* sections */
section,
footer{
  opacity:0;
  animation:fadeIn 4s ease-out forwards;
  animation-delay:.8s;
}

section{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  width:100%;
  text-align:center;
  position:relative;
  overflow:hidden;
  background:rgba(0,0,0,.5);
}

.hero{
  min-height:auto;
  height:clamp(80px,10vh,160px);
  padding:0;
  background:transparent;
}

h1{
  font-size:5rem;
  letter-spacing:50px;
}

.video-slot{
  position:relative;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* hero */
.video1 .video-slot{
  height:100vh;
}

.video1 .video-slot video{
  width:100%;
  height:50%;
  object-fit:cover;
  aspect-ratio:16/9;
}

/* horizontal */
.video1a video,
.video1b video,
.video1c video,
.video1d video,
.video2 video,
.video3 video,
.video4 video,
.video5 video{
  width:100%;
  height:100vh;
  aspect-ratio:16/9;
  object-fit:cover;
  display:block;
}

/* vertical */
.video6a video,
.video6b video,
.video6c video,
.video6d video,
.video7 video,
.video8 video,
.video9 video,
.video10 video{
  width:auto;
  height:100%;
  max-height:100vh;
  aspect-ratio:9/16;
  object-fit:cover;
  border-radius:15px;
}

/* controls */
.controls{
  position:absolute;
  bottom:20px;
  width:100%;
  padding:0 20px;
  display:flex;
  justify-content:space-between;
  pointer-events:none;
  z-index:2;
}

.controls button{
  pointer-events:auto;
  padding:10px 15px;
  font-size:1.2rem;
  background:rgba(0,0,0,.6);
  color:#fff;
  border:none;
  border-radius:5px;
  cursor:pointer;
  transition:.3s;
}

.controls button:hover{
  background:rgba(176,46,46,.8);
}

.contacts p{
  font-size:1.3rem;
  margin:15px 0;
}

a{
  color:#FFF5EE;
  text-decoration:none;
}

a:hover{
  text-decoration:underline;
}

footer{
  text-align:center;
  padding:40px 20px;
  background:rgba(0,0,0,.6);
  color:#ccc;
  font-size:.9rem;
}

/* mobile */
@media (max-width:768px){

.video1{
  margin-top:70px;
  margin-bottom:140px;
}

.contacts{
  padding-top:350px;
  padding-bottom:70px;
}

.video1 .video-slot{
  height:50vh;
}

.video1a .video-slot,
.video1b .video-slot,
.video1c .video-slot,
.video1d .video-slot,
.video2 .video-slot,
.video3 .video-slot,
.video4 .video-slot,
.video5 .video-slot{
  width:100vw;
  height:calc(100vw * 9 / 16);
}

.video1a video,
.video1b video,
.video1c video,
.video1d video,
.video2 video,
.video3 video,
.video4 video,
.video5 video{
  width:100%;
  height:100%;
  object-fit:cover;
}

section{
  min-height:auto;
  padding:0;
}

.controls{
  bottom:5vh;
  padding:0 10px;
}

}
</style>

<script>
function togglePlay(id){
  const video=document.getElementById(id);
  const btn=document.getElementById('playBtn'+id.replace('video',''));
  if(video.paused){
    video.play();
    btn.textContent='❚❚';
  }else{
    video.pause();
    btn.textContent='►';
  }
}

function toggleMute(id){
  const video=document.getElementById(id);
  const btn=document.getElementById('muteBtn'+id.replace('video',''));
  video.muted=!video.muted;
  btn.textContent=video.muted?'🔇':'🔈';
}

function hideSectionForVideo(videoEl){
  const section=videoEl.closest('section');
  if(section) section.style.display='none';
}

document.addEventListener('DOMContentLoaded',()=>{

const bg=document.getElementById('bgVideo');
if(bg){
  bg.play().catch(()=>{});
}

const videos=document.querySelectorAll('video');

videos.forEach(v=>{
  if(v.id==='bgVideo') return;

  const src=v.getAttribute('src') || '';
  if(!src.trim()){
    hideSectionForVideo(v);
    return;
  }

  v.addEventListener('error',()=>hideSectionForVideo(v));
});

});
</script>
